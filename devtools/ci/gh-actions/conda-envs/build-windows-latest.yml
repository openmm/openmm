name: build
channels:
- conda-forge
- defaults
dependencies:
# build
- jom
- cmake<4.0
- ccache
- m2-coreutils
# host
- python
- cython
# Python 3.13+ needs SWIG 4.3+ (stdlib / C-API changes)
- swig>=4.3
- numpy
- doxygen
- setuptools
- khronos-opencl-icd-loader
# test
- pytest
- pytest-xdist
- pytest-timeout
