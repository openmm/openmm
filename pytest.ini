# Repo-root pytest config for ML / ice RPMD tests (not upstream build/python/tests).
# Quick run: pytest -m "not cuda and not slow"
# Full (local): pytest tests/openmmml tests/uma_ice_rpmd

[pytest]
testpaths =
    tests/openmmml
    tests/uma_ice_rpmd

python_files = test_*.py

addopts = -ra

markers =
    fairchem: needs fairchem.core (and often UMA checkpoint download)
    cuda: needs NVIDIA GPU and OpenMM CUDA platform
    slow: long-running or large downloads
    ice_rpmd: UMA ice RPMD workflow / integration tests
    openmmml: openmmml Python wrapper tests
    requires_lammps: needs LAMMPS installed for subprocess tests

filterwarnings =
    ignore::DeprecationWarning
